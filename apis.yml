aid: pie
name: Pie Insurance
description: >
  Pie Insurance is a small business workers compensation insurance platform
  that provides a REST API for approved partners to quote, bind, and manage
  workers comp policies. The partner API supports appetite checking, price
  indication, quote submission, document upload, and retrieval of bindable
  quotes, enabling agencies, aggregators, and technology platforms to embed
  workers comp quoting directly into their own workflows. Pie targets small
  businesses across 39 states and Washington D.C., using data-driven
  underwriting to offer savings of up to 30% versus traditional carriers.
  Payroll-based premium calculations and policy management including
  certificates of insurance are central to the platform.
